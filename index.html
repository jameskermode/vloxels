<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Vloxels</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        font-family: system-ui, -apple-system, sans-serif;
        /* Stop the browser hijacking touch drags for scrolling/zoom. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      /* Small on-screen readout for fps + physics step time (toggle with F). */
      #fps {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 4px 8px;
        font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace;
        color: #b8f0c0;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 6px;
        white-space: pre;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fps"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
